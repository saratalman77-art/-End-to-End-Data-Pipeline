name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.10"
  REGISTRY: ghcr.io

jobs:
  lint:
    name: "🔍 Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 airflow/ spark/ kafka/ storage/ governance/ ml/ monitoring/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --count --statistics

      - name: Check formatting with black
        run: |
          black --check --line-length=120 \
            airflow/ spark/ kafka/ storage/ governance/ ml/ monitoring/

      - name: Check import ordering
        run: |
          isort --check-only --profile black \
            airflow/ spark/ kafka/ storage/ governance/ ml/ monitoring/

  python-tests:
    name: "🧪 Python Unit Tests"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-and-push-airflow:
    name: "🐳 Airflow → GHCR"
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./airflow
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/e2e-pipeline-airflow:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/e2e-pipeline-airflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-spark:
    name: "🐳 Spark → GHCR"
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./spark
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/e2e-pipeline-spark:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/e2e-pipeline-spark:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-kafka-producer:
    name: "🐳 Kafka Producer → GHCR"
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./kafka
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/e2e-pipeline-kafka-producer:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/e2e-pipeline-kafka-producer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-dotnet-api:
    name: "🐳 .NET API → GHCR"
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./sample_dotnet_backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/e2e-pipeline-dotnet-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/e2e-pipeline-dotnet-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-validation:
    name: "📋 Docker Compose Validation"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Copy env file
        run: cp .env.example .env
      - name: Validate docker-compose.yaml
        run: docker compose config --quiet

  integration-test:
    name: "🔗 Integration Test"
    runs-on: ubuntu-latest
    needs: [build-and-push-airflow, build-and-push-spark, build-and-push-kafka-producer, build-and-push-dotnet-api, docker-compose-validation]
    env:
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_secret_2024
      POSTGRES_DB: processed_db
      MYSQL_ROOT_PASSWORD: root_secret_2024
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start core infrastructure
        run: |
          docker compose up -d zookeeper kafka mysql postgres minio redis mongodb
          echo "Waiting for services to be healthy..."
          sleep 60

      - name: Check service health
        run: |
          echo "=== Service Status ==="
          docker compose ps
          echo ""
          echo "=== Kafka Check ==="
          docker compose exec -T kafka kafka-topics --bootstrap-server localhost:29092 --list || echo "Kafka not ready"
          echo ""
          echo "=== PostgreSQL Check ==="
          docker compose exec -T postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          echo ""
          echo "=== MySQL Check ==="
          docker compose exec -T mysql mysqladmin ping -h localhost -u root -p"$MYSQL_ROOT_PASSWORD"
          echo ""
          echo "=== Redis Check ==="
          docker compose exec -T redis redis-cli ping

      - name: Teardown
        if: always()
        run: docker compose down -v

  pipeline-complete:
    name: "✅ Pipeline Complete"
    runs-on: ubuntu-latest
    needs: [lint, python-tests, build-and-push-airflow, build-and-push-spark, build-and-push-kafka-producer, build-and-push-dotnet-api, docker-compose-validation, integration-test]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.build-and-push-airflow.result }}" = "failure" ] || \
             [ "${{ needs.build-and-push-spark.result }}" = "failure" ] || \
             [ "${{ needs.build-and-push-kafka-producer.result }}" = "failure" ] || \
             [ "${{ needs.build-and-push-dotnet-api.result }}" = "failure" ] || \
             [ "${{ needs.docker-compose-validation.result }}" = "failure" ]; then
            echo "Pipeline failed - check individual job logs"
            exit 1
          fi
          echo "All pipeline checks passed successfully!"
